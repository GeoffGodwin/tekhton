services:
  tekhton-conductor:
    build:
      context: ./conductor
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: tekhton-conductor
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    ports:
      - "${CONDUCTOR_PORT:-7411}:7411/tcp"
    volumes:
      # Config file
      - ./conductor.cfg:/config/conductor.cfg:ro
      # Persistent state + logs
      - conductor-data:/data
      # Tekhton source (read-only)
      - ${TEKHTON_HOME:?Set TEKHTON_HOME to the tekhton repo path}:/tekhton:ro
      # Target project repo (read-write for git operations)
      - ${PROJECT_REPO:?Set PROJECT_REPO to the target project path}:/repo
      # SSH keys for git push
      - ~/.ssh:/home/conductor/.ssh:ro
      # GitHub CLI auth
      - ~/.config/gh:/home/conductor/.config/gh:ro
      # Claude Code CLI auth
      - ~/.claude:/home/conductor/.claude:ro
    environment:
      TZ: ${TZ:-UTC}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY}
      HOME: /home/conductor
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7411/status", "-H", "Authorization: Bearer dummy"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  conductor-data:
