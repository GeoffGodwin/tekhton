# Action refs use major-version tags (@v4, @v5, @v6) rather than commit SHAs.
# This is a deliberate tradeoff: SHAs are strictly more immutable but the blast
# radius of a tag-mutation attack is bounded by `permissions: contents: read`
# below — the workflow has no write access to the repo, secrets, or registries,
# and no external PATs are referenced. Workflows that mint or use a PAT
# (e.g. brew-bump.yml) pin to commit SHAs because their effective blast radius
# extends beyond GITHUB_TOKEN. Revisit this workflow's pinning posture if it
# ever needs broader permissions or starts referencing external secrets.
name: Go Build

on:
  push:
    branches:
      - main
      - feature/GoWedges
      - 'theseus/**'
  pull_request:
    branches:
      - main
      - feature/GoWedges
      - 'theseus/**'

permissions:
  contents: read

jobs:
  build:
    name: Cross-compile build matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all targets
        run: make build-all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tekhton-binaries
          path: bin/tekhton-*
          if-no-files-found: error
          retention-days: 14

  vet-test:
    name: Vet + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: make vet

      - name: go test
        run: make test

      # m04: per-package coverage gate. The two ported packages must each hit
      # 80% — a global average would let one under-tested file hide behind a
      # well-tested one. cmd/tekhton and internal/proto are excluded by design
      # (CLI plumbing and pure types — coverage there is theatre).
      - name: Coverage gate (per-package)
        run: |
          set -euo pipefail
          fail=0
          for pkg in internal/causal internal/state; do
            echo "==> coverage: $pkg"
            go test -coverprofile=cover.out "./$pkg/..."
            go tool cover -func=cover.out
            pct=$(go tool cover -func=cover.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')
            echo "    $pkg total: ${pct}%"
            if awk "BEGIN { exit !($pct < 80) }"; then
              echo "::error::$pkg coverage ${pct}% < 80% threshold"
              fail=1
            fi
          done
          exit "$fail"

      # m04: fuzz harnesses run for a fixed-time deterministic burst on every
      # PR. The 20s budget is enough to exercise the seed corpus + a few
      # mutations without bloating CI wall-clock. The nightly job runs longer.
      - name: Fuzz (deterministic burst)
        run: |
          set -euo pipefail
          go test -run=^$ -fuzz=FuzzParseStageAndSeq -fuzztime=20s ./internal/causal/...
          go test -run=^$ -fuzz=FuzzCausalEvent       -fuzztime=20s ./internal/causal/...
          go test -run=^$ -fuzz=FuzzQuote_RoundTrip   -fuzztime=20s ./internal/causal/...
          go test -run=^$ -fuzz=FuzzStateSnapshot     -fuzztime=20s ./internal/state/...
          go test -run=^$ -fuzz=FuzzParseLegacyMarkdown -fuzztime=20s ./internal/state/...

  lint:
    name: golangci-lint + wedge audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to a specific semver so CI runs the same linter version
          # across PRs. `latest` would silently shift behavior any time
          # golangci-lint cuts a release.
          version: v1.64.5
          args: --timeout=5m

      # m04: enforce the bash↔Go seam invariant. Only lib/causality.sh,
      # lib/state.sh, and lib/state_helpers.sh may write to the wedge-owned
      # paths. Bypasses get caught at PR time, not at runtime.
      - name: Wedge audit
        run: bash scripts/wedge-audit.sh
