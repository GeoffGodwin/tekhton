name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate no rogue gitlinks
        run: |
          rogue=$(git ls-files --stage | awk '$1 == "160000" {print $4}')
          if [ -z "$rogue" ]; then
            echo "OK: no gitlinks in tree"
            exit 0
          fi
          approved=""
          if [ -f .gitmodules ]; then
            approved=$(git config --file .gitmodules --get-regexp 'submodule\..*\.path' 2>/dev/null | awk '{print $2}' || true)
          fi
          failed=0
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            if ! printf '%s\n' "$approved" | grep -qxF "$p"; then
              echo "::error::Rogue gitlink (mode 160000) at '$p' — not declared in .gitmodules. This breaks 'actions/checkout' with 'no url found for submodule path'."
              failed=1
            fi
          done <<< "$rogue"
          exit "$failed"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Skip retroactive (pre-V3) tags
        id: gate
        run: |
          if [ "${{ steps.version.outputs.major }}" -lt 3 ]; then
            echo "::notice::Skipping tarball build for retroactive tag ${GITHUB_REF_NAME}. Pre-V3 source trees predate the modern release layout (tools/, completions/, install.sh, LICENSE)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tarball
        if: steps.gate.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Build the path list dynamically — only include paths that actually
          # exist at this tag's commit. This makes the workflow tolerant of
          # ongoing structural changes to the repo without needing to update
          # the workflow in lockstep.
          PATHS=()
          for p in tekhton.sh lib stages prompts templates tools \
                   completions install.sh LICENSE README.md; do
            if [ -e "$p" ]; then
              PATHS+=("$p")
            else
              echo "::warning::Skipping missing path: $p"
            fi
          done
          if [ ${#PATHS[@]} -eq 0 ]; then
            echo "::error::No releasable paths found at this tag"
            exit 1
          fi
          tar -czf "tekhton-${VERSION}.tar.gz" \
            --transform "s,^,tekhton-${VERSION}/," \
            --exclude='.git*' \
            --exclude='site/' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.claude/' \
            "${PATHS[@]}"

      - name: Generate checksums
        if: steps.gate.outputs.skip == 'false'
        run: sha256sum tekhton-*.tar.gz > SHA256SUMS

      - name: Resolve release notes file
        if: steps.gate.outputs.skip == 'false'
        id: notes
        run: |
          NOTES_FILE="tools/release_notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Using release notes from $NOTES_FILE"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No release notes file at $NOTES_FILE — falling back to auto-generated notes"
          fi

      - name: Create or update GitHub Release
        if: steps.gate.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tekhton-*.tar.gz
            SHA256SUMS
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: ${{ steps.notes.outputs.found == 'false' }}
