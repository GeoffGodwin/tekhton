name: Bump Homebrew Formula
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Compute tarball sha256
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Clone tap repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: geoffgodwin/homebrew-tekhton
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap

      - name: Update formula
        env:
          TAG: ${{ steps.sha.outputs.tag }}
          TARBALL_SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          cd tap
          sed -i -E \
            -e "s|url \".*\"|url \"https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"${TARBALL_SHA}\"|" \
            Formula/tekhton.rb

      - name: Commit and push
        env:
          TAG: ${{ steps.sha.outputs.tag }}
        run: |
          cd tap
          git config user.name "tekhton-bot"
          git config user.email "noreply@tekhton.dev"
          git add Formula/tekhton.rb
          git commit -m "tekhton ${TAG}"
          git push

  smoke-test:
    needs: bump
    runs-on: macos-latest
    steps:
      - name: Install from tap and verify
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          eval "$(brew shellenv)"
          brew tap geoffgodwin/tekhton
          brew install tekhton

          echo "PATH=$PATH"
          echo "bash on PATH: $(command -v bash)"
          bash --version | head -1

          set +e
          out=$(tekhton --version 2>&1)
          status=$?
          set -e

          echo "tekhton --version exit=$status"
          echo "tekhton --version output: $out"
          [ "$status" -eq 0 ] || {
            echo "::error::tekhton --version failed after install"
            exit 1
          }

          echo "$out" | grep -q "${GITHUB_REF_NAME#v}" || {
            echo "::error::Version mismatch — expected ${GITHUB_REF_NAME#v} in output: $out"
            exit 1
          }
