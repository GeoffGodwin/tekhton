#!/usr/bin/env bash
# =============================================================================
# pipeline.conf — Self-build configuration for Tekhton
#
# This configures the Tekhton execution pipeline to work ON Tekhton itself,
# implementing the --plan feature described in DESIGN.md.
# =============================================================================

# --- Project identity --------------------------------------------------------
PROJECT_NAME="Tekhton"
PROJECT_DESCRIPTION="multi-agent development pipeline — self-build (V3 brownfield)"

# --- Required CLI tools ------------------------------------------------------
# Only list tools the pipeline runner itself needs to function.
# Project analysis tools (shellcheck) are invoked via ANALYZE_CMD — not here.
REQUIRED_TOOLS="claude git bash"

# --- Agent models ------------------------------------------------------------
CLAUDE_CODER_MODEL="claude-opus-4-6"
CLAUDE_JR_CODER_MODEL="claude-haiku-4-5"
CLAUDE_SCOUT_MODEL="claude-haiku-4-5"
CLAUDE_STANDARD_MODEL="claude-sonnet-4-6"
CLAUDE_ARCHITECT_MODEL="claude-sonnet-4-6"
CLAUDE_TESTER_MODEL="claude-haiku-4-5"

# --- Turn limits (normal mode) ----------------------------------------------
CODER_MAX_TURNS=35
JR_CODER_MAX_TURNS=15
REVIEWER_MAX_TURNS=10
TESTER_MAX_TURNS=30
SCOUT_MAX_TURNS=20
SEED_CONTRACTS_MAX_TURNS=20

# --- Turn limits (milestone mode overrides) ----------------------------------
MILESTONE_CODER_MAX_TURNS=70
MILESTONE_JR_CODER_MAX_TURNS=35
MILESTONE_REVIEWER_MAX_TURNS=25
MILESTONE_TESTER_MAX_TURNS=60
# MILESTONE_TESTER_MODEL="claude-sonnet-4-6"

# --- Review loop -------------------------------------------------------------
MAX_REVIEW_CYCLES=2

# --- Build / test / analyze commands -----------------------------------------
# Shellcheck is the primary static analysis tool for this project.
ANALYZE_CMD="shellcheck tekhton.sh lib/*.sh stages/*.sh"

# Self-test suite
TEST_CMD="bash tests/run_tests.sh"

# Syntax check — fast "does it parse?" gate
BUILD_CHECK_CMD="bash -n tekhton.sh && for f in lib/*.sh stages/*.sh; do bash -n \"\$f\"; done"

# Pattern to detect errors in analyze output (shellcheck default format)
ANALYZE_ERROR_PATTERN="error"

# Pattern to detect errors in compile output
BUILD_ERROR_PATTERN="error"

# --- Pipeline file paths -----------------------------------------------------
PIPELINE_STATE_FILE=".claude/PIPELINE_STATE.md"
LOG_DIR=".claude/logs"

# --- Agent role files (relative to repo root) --------------------------------
CODER_ROLE_FILE=".claude/agents/coder.md"
REVIEWER_ROLE_FILE=".claude/agents/reviewer.md"
TESTER_ROLE_FILE=".claude/agents/tester.md"
JR_CODER_ROLE_FILE=".claude/agents/jr-coder.md"

# --- Context files -----------------------------------------------------------
ARCHITECTURE_FILE="ARCHITECTURE.md"
GLOSSARY_FILE=""
PROJECT_RULES_FILE="CLAUDE.md"

# --- Design document ---------------------------------------------------------
DESIGN_FILE="DESIGN.md"

# --- Architecture drift configuration ----------------------------------------
ARCHITECTURE_LOG_FILE="ARCHITECTURE_LOG.md"
DRIFT_LOG_FILE="DRIFT_LOG.md"
HUMAN_ACTION_FILE="HUMAN_ACTION_REQUIRED.md"
DRIFT_OBSERVATION_THRESHOLD=8
DRIFT_RUNS_SINCE_AUDIT_THRESHOLD=5
NON_BLOCKING_LOG_FILE="NON_BLOCKING_LOG.md"
NON_BLOCKING_INJECTION_THRESHOLD=8

# --- Human notes configuration ----------------------------------------------
NOTES_FILTER_CATEGORIES="BUG|FEAT|POLISH"

# --- Architect agent ---------------------------------------------------------
ARCHITECT_ROLE_FILE=".claude/agents/architect.md"
ARCHITECT_MAX_TURNS=25
DEPENDENCY_CONSTRAINTS_FILE=""

# --- V3 Feature Flags --------------------------------------------------------
# Repo map: tree-sitter powered intelligent indexing for context-aware agents
REPO_MAP_ENABLED=true
REPO_MAP_TOKEN_BUDGET=2048
REPO_MAP_LANGUAGES="bash,python"

# Serena
SERENA_ENABLED=true
SERENA_LANGUAGE_SERVERS="pylsp, bash-language-server"

# Context compiler: task-scoped context assembly
CONTEXT_COMPILER_ENABLED=true

# Cleanup: autonomous debt sweep after successful milestones
CLEANUP_ENABLED=true
CLEANUP_BATCH_SIZE=5
CLEANUP_TRIGGER_THRESHOLD=5
