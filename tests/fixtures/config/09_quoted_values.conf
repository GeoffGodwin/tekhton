# Mixed quoting styles — single, double, bare, plus inline comments and
# values that contain pipes (allowed for *_CMD / *_PATTERN keys).
PROJECT_NAME='single-quoted'
CLAUDE_STANDARD_MODEL="claude-sonnet-4-6"
ANALYZE_CMD="bash -c 'eslint . | tee out.txt'"
TEST_CMD=npm test
ANALYZE_ERROR_PATTERN="error|fail"
NOTES_FILTER_CATEGORIES="BUG|FEAT|POLISH|DOC"
PROJECT_DESCRIPTION="A real one"  # trailing comment ignored
